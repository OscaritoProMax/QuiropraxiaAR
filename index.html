<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiromasajes — Iniciar sesión</title>
  <link rel="stylesheet" href="./src/pages/css/main.css">
  <link rel="stylesheet" href="./src/pages/css/login.css">
  <style>
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: #adb5bd;
      font-size: 13px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e9ecef;
    }

    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 20px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      border: 1.5px solid #e9ecef;
      border-radius: 6px;
      background: #fff;
      color: #212529;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-google:hover {
      border-color: #0A76D8;
      background: #f8fbff;
      color: #0A76D8;
    }
    .btn-google:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-google svg {
      flex-shrink: 0;
    }
  </style>
</head>

<body>

  <div class="login-wrapper">

    <!-- Panel izquierdo -->
    <div class="login-banner">
      <div class="login-banner-logo">Quiromasajes E.F</div>
      <div class="login-banner-sub">Sistema Administrativo</div>
      <div class="login-banner-icon">
        <img src="./img/quiro.png" alt="Logo Quiromasajes"
          style="width:80px;height:80px;object-fit:contain;border-radius:50%">
      </div>
      <div class="login-banner-title">
        Bienvenido al sistema de gestión Quiromasajes E.F
      </div>
    </div>

    <!-- Panel derecho -->
    <div class="login-form-panel">
      <h1 class="login-header-text">Iniciar sesión</h1>
      <p class="login-sub-text">Ingresa tus credenciales para continuar</p>

      <div id="error-msg" style="display:none"></div>

      <!-- Botón Google -->
      <button class="btn-google" id="btn-google" type="button">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continuar con Google
      </button>

      <div class="divider">o ingresa con tu cuenta</div>

      <form id="login-form" class="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input class="input-text" type="email" id="email"
            placeholder="usuario@quiromasajesef.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input class="input-text" type="password" id="password"
            placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn btn-primary btn-lg login-btn" id="btn-login">
          Ingresar
        </button>
        <p class="login-link">
          ¿Olvidaste tu contraseña?
          <a href="mailto:admin@quiromasajes.com">Contacta al administrador</a>
        </p>
      </form>
    </div>

  </div>

  <script type="module">
    import { initLogin } from "./src/pages/index/loginController.js";
    initLogin();
  </script>

</body>
</html>
