<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiromasajes — Call-center</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <style>

  </style>
</head>
<body>

<div class="app-container">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="toggle-btn" id="btn-toggle" title="Expandir/Contraer">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
  </div>

  <div class="profile-container">
    <div class="profile-avatar" id="sidebar-avatar">—</div>
    <div class="profile-info">
      <p class="profile-title" id="sidebar-nombre">Cargando...</p>
      <p class="profile-subtitle" id="sidebar-rol">—</p>
    </div>
  </div>

  <nav class="menu-container">
    <div class="menu-section-label">Principal</div>
    




    <button class="menu-btn menu-active" data-view="citas">
      <span class="menu-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
      </span>
      <span class="menu-label">Citas</span>
    </button>

        <button class="menu-btn" data-view="cronograma">
      <span class="menu-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
      </span>
      <span class="menu-label">Cronograma</span>
    </button>


  </nav>


    <div class="menu-section-label">Herramientas</div>
    <button class="menu-btn" data-view="herramientas">
      <span class="menu-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </span>
      <span class="menu-label">Herramientas</span>
    </button>
  <div class="logout-area">
    <button class="logout-btn" id="btn-logout">
      <span class="menu-label">Cerrar sesión</span>
    </button>
  </div>
</aside>

  <!-- ÁREA PRINCIPAL -->
  <div class="main-area">
    <div class="topbar">
      <div class="topbar-left">
        <h1 id="topbar-title">Dashboard</h1>
        <p  id="topbar-sub">Módulo Call-center</p>
      </div>
      <div class="topbar-right" id="topbar-actions"></div>
    </div>

    <div class="page-content">

      <!-- DASHBOARD — no disponible para call-center -->



      <!-- CITAS — vista de slots ─────────────────────────── -->
      <section id="view-citas" class="view-section active">
        <div class="search-items" style="justify-content:space-between;flex-wrap:wrap;gap:10px">
          <div style="display:flex;align-items:center;gap:10px">
            <label class="form-label" style="margin:0">Fecha:</label>
            <input class="input-text" type="date" id="filter-fecha" style="width:160px"/>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-gray btn-sm" id="btn-hoy">Hoy</button>
            <button class="btn btn-gray btn-sm" id="btn-manana">Mañana</button>
          </div>
        </div>
        <div id="alert-cita"></div>
        <div id="slots-container" class="slots-wrap">
          <div class="empty-state">Selecciona una fecha para ver la agenda</div>
        </div>
      </section>

      <!-- cronograma — vista de slots ─────────────────────────── -->
            <section id="view-cronograma" class="view-section">
        <!-- Resumen de estado -->
        <div style="display:flex;align-items:center;justify-content:space-between;
                    margin-bottom:16px;flex-wrap:wrap;gap:10px">
          <div id="crono-resumen" style="display:flex;align-items:center;gap:8px"></div>
          <button class="btn btn-gray btn-sm" id="btn-refresh-crono">↺ Actualizar</button>
        </div>
      
        <!-- Contenedor de tarjetas -->
        <div id="cronograma-container"></div>
      </section>





    </div>
  </div>
</div>


<!-- ══ MODAL Nuevo paciente (completo) ══ -->
<div class="modal-overlay" id="modal-paciente">
  <div class="modal-box">
    <button class="modal-close" data-close="modal-paciente">×</button>
    <h2 class="modal-title">Registrar nuevo paciente</h2>
    <div id="alert-form-pac"></div>
    <div class="form-row-2col">
      <div class="form-group">
        <label class="form-label">Nombre completo <span>*</span></label>
        <input class="input-text" id="p-nombre" placeholder="Carlos Mendoza"/>
      </div>
      <div class="form-group">
        <label class="form-label">Teléfono celular <span>*</span></label>
        <input class="input-text" id="p-tel" placeholder="+57 300 000 0000" type="tel"/>
      </div>
      </div>
      <div class="form-row-2col">
        <div class="form-group">
          <label class="form-label">Documento (opcional)</label>
          <input class="input-text" id="p-doc" placeholder="Cédula o ID"/>
        </div>
      <div class="form-group">
        <label class="form-label">Correo</label>
        <input class="input-text" id="p-email" type="email" placeholder="paciente@correo.com"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Procedencia</label>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
        <label style="font-size:12px;cursor:pointer">
          <input type="radio" name="p-origen" value="colombia" checked style="margin-right:4px"/>
          Colombia
        </label>
        <label style="font-size:12px;cursor:pointer">
          <input type="radio" name="p-origen" value="extranjero" style="margin-right:4px"/>
          Otro país
        </label>
      </div>
      <div id="p-origen-colombia" style="display:flex;gap:8px;flex-wrap:wrap">
        <select class="input-text" id="p-dpto" style="flex:1;min-width:160px">
          <option value="">Departamento...</option>
        </select>
        <select class="input-text" id="p-ciudad" style="flex:1;min-width:160px" disabled>
          <option value="">Ciudad...</option>
        </select>
      </div>
      <div id="p-origen-extranjero" style="display:none;gap:8px;flex-wrap:wrap">
        <select class="input-text" id="p-pais" style="flex:1;min-width:160px">
          <option value="">País...</option>
        </select>
      </div>
    </div>
    <div class="form-row-2col">
      <div class="form-group">
        <label class="form-label">Fecha de nacimiento</label>
        <input class="input-text" id="p-nacimiento" type="date"/>
      </div>
      <div class="form-group"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Condición / motivo de consulta</label>
      <input class="input-text" id="p-condicion" placeholder="Ej: Dolor lumbar crónico"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gray" data-close="modal-paciente">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-pac">Registrar</button>
    </div>
  </div>
</div>


<!-- ══ MODAL Nueva cita ══ -->
<div class="modal-overlay" id="modal-cita">
  <div class="modal-box">
    <button class="modal-close" data-close="modal-cita">×</button>
    <h2 class="modal-title">Agendar nueva cita</h2>
    <div id="alert-form-cita"></div>

    <!-- Búsqueda de paciente -->
    <div class="form-group">
      <label class="form-label">Paciente <span>*</span></label>
      <input class="input-text" id="c-buscar-pac" placeholder="Buscar nombre o documento..."
        autocomplete="off"/>
      <div id="c-pac-sugerencias" style="border:1px solid #e0e0e0;border-top:none;border-radius:0 0 5px 5px;max-height:160px;overflow-y:auto;display:none;background:#fff;position:relative;z-index:10"></div>
      <input type="hidden" id="c-paciente-id"/>
      <input type="hidden" id="c-paciente-nombre"/>
      <input type="hidden" id="c-paciente-ciudad"/>
    </div>

    <!-- Registro rápido -->
    <div class="quick-register" id="quick-register">
      <h4>➕ Registrar paciente rápido</h4>
      <div class="form-row-2col">
        <div class="form-group">
          <label class="form-label">Nombre <span>*</span></label>
          <input class="input-text" id="qp-nombre" placeholder="Nombre completo"/>
        </div>
        <div class="form-group">
          <label class="form-label">Teléfono celular <span>*</span></label>
          <input class="input-text" id="qp-tel" placeholder="+57 300 000 0000" type="tel"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Procedencia <span>*</span></label>
        <div style="display:flex;gap:6px;margin-bottom:6px">
          <label style="font-size:12px;cursor:pointer">
            <input type="radio" name="qp-origen" value="colombia" checked style="margin-right:4px"/>
            Colombia
          </label>
          <label style="font-size:12px;cursor:pointer">
            <input type="radio" name="qp-origen" value="extranjero" style="margin-right:4px"/>
            Otro país
          </label>
        </div>
        <div id="qp-origen-colombia" style="display:flex;gap:6px;flex-wrap:wrap">
          <select class="input-text" id="qp-dpto" style="flex:1;min-width:140px">
            <option value="">Departamento...</option>
          </select>
          <select class="input-text" id="qp-ciudad" style="flex:1;min-width:140px" disabled>
            <option value="">Ciudad...</option>
          </select>
        </div>
        <div id="qp-origen-extranjero" style="display:none">
          <select class="input-text" id="qp-pais" style="width:100%">
            <option value="">País...</option>
          </select>
        </div>
      </div>
      <button class="btn btn-soft btn-sm" id="btn-quick-save" style="margin-top:4px">
        Guardar y usar este paciente
      </button>
    </div>

    <div class="form-row-2col">
      <div class="form-group">
        <label class="form-label">Fecha <span>*</span></label>
        <input class="input-text" type="date" id="c-fecha"/>
      </div>
      <div class="form-group">
        <label class="form-label">Hora <span>*</span></label>
        <select class="input-text" id="c-hora"></select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Tipo de sesión</label>
      <select class="input-text" id="c-tipo">
        <option>Ajuste general</option><option>Evaluación inicial</option>
        <option>Terapia lumbar</option><option>Terapia cervical</option>
        <option>Seguimiento</option><option>Descompresión</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Notas adicionales</label>
      <textarea class="input-text" id="c-notas" rows="2" placeholder="Observaciones..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gray" data-close="modal-cita">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-cita">Agendar</button>
    </div>
  </div>
</div>


<!-- ══ MODAL Reprogramar ══ -->
<div class="modal-overlay" id="modal-reprogramar">
  <div class="modal-box">
    <button class="modal-close" data-close="modal-reprogramar">×</button>
    <h2 class="modal-title">Reprogramar cita</h2>
    <div class="form-row-2col">
      <div class="form-group">
        <label class="form-label">Nueva fecha <span>*</span></label>
        <input class="input-text" type="date" id="r-fecha"/>
      </div>
      <div class="form-group">
        <label class="form-label">Nueva hora <span>*</span></label>
        <select class="input-text" id="r-hora"></select>
      </div>
    </div>
    <div id="alert-reprog" style="margin-bottom:8px"></div>
    <div class="modal-actions">
      <button class="btn btn-gray" data-close="modal-reprogramar">Cancelar</button>
      <button class="btn btn-primary" id="btn-confirmar-reprog">Confirmar</button>
    </div>
  </div>
</div>


<script src="./js/config.js"></script>
<script type="module">
 import { initCallcenter } from './handlers.js';
  initCallcenter();
</script>

</body>
</html>
